name: SPC Outlook Story Generator

on:
  schedule:
    # ~30-40 min after each SPC Day 1 Outlook issuance (0600z, 1300z, 1630z, 2000z, 0100z UTC)
    - cron: "35 6 * * *"
    - cron: "35 13 * * *"
    - cron: "50 16 * * *"
    - cron: "35 20 * * *"
    - cron: "35 1 * * *"
  workflow_dispatch: {} # lets you trigger it manually to test

# Prevents overlapping runs from racing each other on git push.
concurrency:
  group: spc-outlook-story
  cancel-in-progress: false

permissions:
  contents: write # needed to commit/push the generated slides

jobs:
  generate:
    # Adjust this label to match whatever you tagged your self-hosted M1 runner with.
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
        # actions/checkout persists a token-authenticated remote by default,
        # which is what lets `git push` below work without extra setup.

      - name: Install dependencies
        run: pip3 install --user -r requirements.txt

      # main requires PRs + review, so the bot can't push slide commits there.
      # Slides live on a separate, unprotected `stories` branch instead, checked
      # out as a worktree here so rotate_old_slides() can see (and prune) the
      # slides already committed from previous runs.
      - name: Check out stories branch
        run: |
          git worktree prune
          if git ls-remote --exit-code --heads origin stories >/dev/null 2>&1; then
            git fetch origin stories
            git worktree add stories-branch origin/stories -B stories
          else
            git worktree add --detach stories-branch
            git -C stories-branch checkout --orphan stories
            git -C stories-branch rm -rf . >/dev/null 2>&1 || true
          fi

      - name: Generate story slides if risk is Enhanced+
        env:
          SPC_STORY_OUTPUT_DIR: ${{ github.workspace }}/stories-branch/stories
          SPC_NTFY_TOPIC: ${{ secrets.SPC_NTFY_TOPIC }}
        run: python3 spc_story_generator.py

      - name: Commit and push new slides
        run: |
          cd stories-branch
          git config user.name "spc-outlook-bot"
          git config user.email "spc-outlook-bot@users.noreply.github.com"
          git add stories/
          if git diff --cached --quiet; then
            echo "No new slides this run -- nothing to commit."
          else
            git commit -m "SPC outlook story: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin stories
          fi

      - name: Upload slides as workflow artifact (optional secondary copy)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spc-story-slides-${{ github.run_id }}
          path: stories-branch/stories/
          if-no-files-found: ignore

      - name: Clean up stories worktree
        if: always()
        run: git worktree remove stories-branch --force || true
